# PicoDualProbe — JTAG scan from Pico (serial 503558606AC9679F) to NEORV32
# Serial MUST be set before init, so it's in the config file not -c

adapter driver cmsis-dap
transport select jtag
adapter speed 1000
adapter serial 503558606AC9679F

jtag newtap auto0 tap -irlen 5 -expected-id 0x00000000 -ignore-version

init
scan_chain
shutdown