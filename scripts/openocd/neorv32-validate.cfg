# PicoDualProbe — NEORV32 JTAG validation
# Read IDCODE, registers, and memory

adapter driver cmsis-dap
transport select jtag
adapter speed 100
adapter serial 50443405A87B281C

# NEORV32 TAP — IR length 5, IDCODE = 0x00000001
jtag newtap neorv32 cpu -irlen 5 -expected-id 0x00000001 -ignore-version

# Create RISC-V target
target create neorv32.cpu riscv -chain-position neorv32.cpu
neorv32.cpu configure -work-area-phys 0x80000000 -work-area-size 0x1000

# Don't halt — just read
init

echo "=== JTAG CHAIN ==="
scan_chain

echo "=== IDCODE ==="
jtag arp_init

echo "=== REGISTERS ==="
reg

echo "=== MEMORY DUMP (0x80000000, 16 words) ==="
mdw 0x80000000 16

echo "=== DONE ==="
shutdown