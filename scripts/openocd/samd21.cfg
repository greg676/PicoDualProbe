# PicoDualProbe — OpenOCD SWD config for SeeedStudio SAMD21
#
# Usage: openocd -f scripts/openocd/samd21.cfg
#
# Wiring (PicoDualProbe Zero → SAMD21):
#   GP14 (SWCLK) → SWCLK
#   GP15 (SWDIO) → SWDIO
#   GP28 (nRST)  → nRST (optional)
#   GND          → GND

adapter driver cmsis-dap
cmsis-dap backend usb_bulk
transport select swd
adapter speed 1000

# SAMD21 target
source [find target/at91samdXX.cfg]

# Reset config
reset_config srst_only separate srst_nogate

# Drop to interactive prompt after init
init