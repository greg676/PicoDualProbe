# PicoDualProbe — NEORV32 JTAG raw IDCODE read
# Just reads the IDCODE register via JTAG, no RISC-V target

adapter driver cmsis-dap
transport select jtag
adapter speed 500
adapter serial 50443405A87B281C

# Just create a TAP, no target
jtag newtap neorv32 cpu -irlen 5 -expected-id 0x00000001 -ignore-version

init
echo "=== SCAN CHAIN ==="
scan_chain
echo "=== JTAG ARP INIT ==="
jtag arp_init
echo "=== DONE ==="
shutdown