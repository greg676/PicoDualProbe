# PicoDualProbe — NEORV32 RISC-V target config
# For the NEORV32 soft-core on Alchitry Platinum V2
#
# Usage: openocd -f scripts/openocd/neorv32.cfg

adapter driver cmsis-dap
transport select jtag
adapter speed 1000
adapter serial 50443405A87B281C

set _CHIPNAME neorv32
jtag newtap $_CHIPNAME cpu -irlen 5 -expected-id 0x00000001 -ignore-version

target create $_CHIPNAME.cpu riscv -chain-position $_CHIPNAME.cpu
$_CHIPNAME.cpu configure -work-area-phys 0x80000000 -work-area-size 0x1000

init
halt
echo "NEORV32 halted. PC:"
reg pc
