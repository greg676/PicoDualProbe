# PicoDualProbe — JTAG scan from Pico to NEORV32
# With explicit reset de-assert

adapter driver cmsis-dap
transport select jtag
adapter speed 1000
adapter serial 503558606AC9679F

# NEORV32 TAP — IR length 5, ignore IDCODE mismatch
jtag newtap neorv32 cpu -irlen 5 -expected-id 0x00000001 -ignore-version

target create neorv32.cpu riscv -chain-position neorv32.cpu

# De-assert reset (pull nRESET high)
init
jtag arp_init
scan_chain
shutdown