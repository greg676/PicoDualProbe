# PicoDualProbe — JTAG chain scan at slow speed (100 kHz)
# For debugging JTAG wiring issues

adapter driver cmsis-dap
transport select jtag
adapter speed 100

# Auto-detect: create a TAP with IRLEN=5, ignore IDCODE mismatch
jtag newtap auto0 tap -irlen 5 -expected-id 0x00000000 -ignore-version

init
scan_chain
shutdown