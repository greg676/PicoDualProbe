# PicoDualProbe — JTAG chain scan (simplest possible JTAG test)
# Reads IDCODE from every device on the JTAG chain.
#
# Usage: openocd -f scripts/openocd/jtag-scan.cfg

source [find scripts/openocd/picodualprobe-jtag.cfg]

# Auto-detect: create a TAP with IRLEN=5, ignore IDCODE mismatch
jtag newtap auto0 tap -irlen 5 -expected-id 0x00000000 -ignore-version

init
scan_chain
shutdown
